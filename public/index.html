<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Database Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>JSON Database Manager</h1>
        <button id="themeToggle">🌙</button>

        <input type="text" id="nameInput" placeholder="Enter name">
        <input type="email" id="emailInput" placeholder="Enter email">

        <div class="field-row">
        <select id="fieldSelect">
        <option value="">Choose extra field</option>
        <option value="phone">Phone</option>
        <option value="address">Address</option>
        <option value="username">Username</option>
        <option value="password">Password</option>
        <option value="college">College</option>
        <option value="course">Course</option>
        <option value="notes">Notes</option>
        <option value="tags">Tags</option>
        <option value="profileImage">Profile Image</option>
        <option value="isActive">isActive</option>
    </select>

    <button type="button" id="addFieldBtn">Add Field</button>
</div>

<div id="extraFields"></div>

<button onclick="addData()">Add Data</button>
        
        <button id="logoutBtn">Logout</button>
        <p id="welcomeText"></p>
        <h2>Stored Data</h2>
        
        <input
        type="text"
        id="searchInput"
        placeholder="Search by name or email"
        onkeyup="loadData()">

        <div id="dataList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
