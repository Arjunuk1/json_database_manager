<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Database Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>JSON Database Manager</h1>
        <button id="themeToggle">🌙</button>

        <<h3>Select Fields</h3>

    <div class="field-options">
    <label><input type="checkbox" value="name"> Name</label>
    <label><input type="checkbox" value="email"> Email</label>
    <label><input type="checkbox" value="username"> Username</label>
    <label><input type="checkbox" value="password"> Password</label>
    <label><input type="checkbox" value="phone"> Phone</label>
    <label><input type="checkbox" value="address"> Address</label>
    <label><input type="checkbox" value="college"> College</label>
    <label><input type="checkbox" value="course"> Course</label>
    <label><input type="checkbox" value="notes"> Notes</label>
    <label><input type="checkbox" value="tags"> Tags</label>
    <label><input type="checkbox" value="profileImage"> Profile Image URL</label>
    <label><input type="checkbox" value="isActive"> Active</label>
</div>

<div id="dynamicFields"></div>
        <button onclick="addData()">Add Data</button>
        
        <button id="logoutBtn">Logout</button>
        <p id="welcomeText"></p>
        <h2>Stored Data</h2>
        
        <input
        type="text"
        id="searchInput"
        placeholder="Search by name or email"
        onkeyup="loadData()">

        <div id="dataList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
